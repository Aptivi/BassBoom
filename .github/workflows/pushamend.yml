name: Push to PPA (amend with original source)

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      orig-name: ${{ steps.dl.outputs.orig-name }}
    steps:
      - name: Download original source
        id: dl
        env:
          ORIG_VERSION: "2.0.3.1-1.0.1-1"
        run: |
          UPSTREAM_VERSION=$(echo "$ORIG_VERSION" | sed -E 's/-[^-]+$//')
          ORIG_NAME="bassboom-3_${UPSTREAM_VERSION}.orig.tar.xz"
          mkdir -p dist
          wget --output-document="dist/${ORIG_NAME}" \
            "https://launchpad.net/~eofla/+archive/ubuntu/bassboom/+sourcefiles/bassboom-3/${ORIG_VERSION}/${ORIG_NAME}"
          echo "orig-name=${ORIG_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: orig-source
          path: dist/${{ steps.dl.outputs.orig-name }}
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noble
            series: "24.04"
          - distro: resolute
            series: "26.04"
          - distro: stonking
            series: "26.10"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - uses: actions/download-artifact@v4
        with:
          name: orig-source
          path: dist
          
      - name: Prepare the source
        run: |
          mv dist/*.orig.tar.xz ..
          tar xf ../*.orig.tar.xz .
          mv .github ..
      
      - name: Install required packages
        run: |
          sudo rm /etc/apt/sources.list.d/microsoft-prod.list
          sudo add-apt-repository -y ppa:eofla/adt
          sudo NEEDRESTART_SUSPEND=1 apt update
          sudo NEEDRESTART_SUSPEND=1 apt install devscripts debhelper-compat dput build-essential equivs
          sudo NEEDRESTART_SUSPEND=1 mk-build-deps -i
          rm *build-deps*

      - name: Changelog targeting ${{ matrix.distro }}
        env:
          DEBEMAIL: "ceo@aptivi.anonaddy.com"
          DEBFULLNAME: "Aptivi CEO"
        run: |
          BASE_VERSION=$(dpkg-parsechangelog -S Version)
          NEW_VERSION="${BASE_VERSION}~${{ matrix.series }}.1"
          dch --newversion "$NEW_VERSION" \
              --distribution "${{ matrix.distro }}" \
              --force-distribution -b \
              "Rebuild for Ubuntu ${{ matrix.series }} (${{ matrix.distro }})"

      - name: Build source package
        run: debuild -S

      - name: Push to Launchpad
        run: |
          cat ../bassboom-3_*_source.changes
          dput -d apt-ppa ../bassboom-3_*_source.changes
