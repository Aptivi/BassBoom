name: Push to PPA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v0.2.*'

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      orig-name: ${{ steps.pack.outputs.orig-name }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install required packages
        run: |
          sudo rm /etc/apt/sources.list.d/microsoft-prod.list
          sudo add-apt-repository -y ppa:eofla/adt
          sudo NEEDRESTART_SUSPEND=1 apt update
          sudo NEEDRESTART_SUSPEND=1 apt install devscripts build-essential equivs
          sudo NEEDRESTART_SUSPEND=1 mk-build-deps -i
          rm *build-deps*

      - name: Initialize offline package
        run: |
          make init-offline
          make clean

      - name: Make original package
        id: pack
        run: |
          UPSTREAM_VERSION=$(dpkg-parsechangelog -S Version | sed -E 's/-[^-]+$//')
          ORIG_NAME="bassboom-3_${UPSTREAM_VERSION}.orig.tar"
          mkdir -p dist
          mv debian ..
          mv .github ..
          tar cfv "dist/${ORIG_NAME}" .
          xz "dist/${ORIG_NAME}"
          mv ../debian .
          echo "orig-name=${ORIG_NAME}.xz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: orig-source
          path: dist/${{ steps.pack.outputs.orig-name }}
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noble
            series: "24.04"
          - distro: resolute
            series: "26.04"
          - distro: stonking
            series: "26.10"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - uses: actions/download-artifact@v4
        with:
          name: orig-source
          path: dist

      - name: Prepare the source
        run: |
          mv dist/*.orig.tar.xz ..
          tar xf ../*.orig.tar.xz .
          mv .github ..

      - name: Import GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Import SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/private.key
          sudo chmod 600 ~/.ssh/private.key
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          cat > ~/.ssh/config << EOF
          Host ppa.launchpad.net
            IdentityFile ~/.ssh/private.key
            User eofla
          EOF
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APT_SSH_PRIV }}
          SSH_KNOWN_HOSTS: ${{ secrets.APT_KNOWN_HOST_FOR_UBUNTU_PPA }}

      - name: Configure Launchpad PPA
        run: |
          cat > ~/.dput.cf << EOF
          [apt-ppa]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~eofla/ubuntu/bassboom/
          login = eofla
          allow_unsigned_uploads = 0
          EOF

      - name: Install required packages
        run: |
          sudo rm /etc/apt/sources.list.d/microsoft-prod.list
          sudo add-apt-repository -y ppa:eofla/adt
          sudo NEEDRESTART_SUSPEND=1 apt update
          sudo NEEDRESTART_SUSPEND=1 apt install devscripts debhelper-compat dput build-essential equivs
          sudo NEEDRESTART_SUSPEND=1 mk-build-deps -i
          rm *build-deps*

      - name: Changelog targeting ${{ matrix.distro }}
        env:
          DEBEMAIL: "ceo@aptivi.anonaddy.com"
          DEBFULLNAME: "Aptivi CEO"
        run: |
          BASE_VERSION=$(dpkg-parsechangelog -S Version)
          NEW_VERSION="${BASE_VERSION}~${{ matrix.series }}.1"
          dch --newversion "$NEW_VERSION" \
              --distribution "${{ matrix.distro }}" \
              --force-distribution -b \
              "Rebuild for Ubuntu ${{ matrix.series }} (${{ matrix.distro }})"

      - name: Build source package
        run: debuild -S -sa

      - name: Push to Launchpad
        run: |
          cat ../bassboom-3_*_source.changes
          dput -d apt-ppa ../bassboom-3_*_source.changes
