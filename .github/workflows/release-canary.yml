name: Prepare release (canary)

on:
  push:
    branches: [ "main", "x/oob/v1.0.x" ]
  pull_request:
    branches: [ "main", "x/oob/v1.0.x" ]
    
jobs:
  build:

    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          ref: ${{ github.ref }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Release Asset Preparation
        run: |
          pip install aptivi-adt
          adt build -b "-p:Configuration=Debug -p:ContinuousIntegrationBuild=true"
          adt buildwix Debug x64
          adt buildwix Debug ARM64
          adt packbin
          adt packwix Debug x64
          adt packwix Debug ARM64
      - uses: actions/upload-artifact@v7
        with:
          name: installer-x64-msi
          path: "artifacts/bassboom-win-x64-installer.exe"
          archive: false
      - uses: actions/upload-artifact@v7
        with:
          name: installer-arm64-msi
          path: "artifacts/bassboom-win-arm64-installer.exe"
          archive: false
      - uses: actions/upload-artifact@v7
        with:
          name: bb-build-dotnet
          path: "private/BassBoom.Cli/bin/Debug/net10.0"
      - uses: actions/upload-artifact@v7
        with:
          name: bb-build-dotnetfx
          path: "private/BassBoom.Cli/bin/Debug/net48"
      - uses: actions/upload-artifact@v7
        with:
          name: bb-build-dotnet-qp
          path: "private/BassBoom.QuickPlay/bin/Debug/net10.0"
      - uses: actions/upload-artifact@v7
        with:
          name: bb-build-dotnetfx-qp
          path: "private/BassBoom.QuickPlay/bin/Debug/net48"
      - uses: actions/upload-artifact@v7
        with:
          name: bb-build-dotnet-qr
          path: "private/BassBoom.QuickRadio/bin/Debug/net10.0"
      - uses: actions/upload-artifact@v7
        with:
          name: bb-build-dotnetfx-qr
          path: "private/BassBoom.QuickRadio/bin/Debug/net48"
      - name: Package Publication
        run: |
          dotnet nuget add source --username AptiviCEO --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Aptivi/index.json"
          adt pushbin -a "${{ secrets.GITHUB_TOKEN }}" -s "github"
